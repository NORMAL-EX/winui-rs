name: build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Build gallery + cloud-mgr (release)
        run: cargo build --release -p gallery -p cloud-mgr

      - name: Run library tests
        run: cargo test -p fluentpx --release

      - name: Upload gallery.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: gallery-exe
          path: target/release/gallery.exe
          if-no-files-found: error

      - name: Upload cloud-mgr.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloud-mgr-exe
          path: target/release/cloud-mgr.exe
          if-no-files-found: error

      # 每次推 main 自动发布/更新 'latest' Release，提供公开免登录直链：
      # https://github.com/NORMAL-EX/winui-rs/releases/download/latest/gallery.exe
      - name: Publish 'latest' release with gallery.exe
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          files: |
            target/release/gallery.exe
            target/release/cloud-mgr.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build gallery (release)
        run: cargo build --release -p gallery
      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/gallery.exe
